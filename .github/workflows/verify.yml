name: Verify

# Verifies lint + types + production build for non-main branches and PRs.
# Uses only repo contents (checkout) and pinned actions — does not consume
# any untrusted user input from PR titles/bodies/comments.

on:
  pull_request:
    branches: [main, DEV, UAT]
  push:
    branches-ignore: [main, DEV, UAT]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (ESLint + TypeScript + Vite)
        env:
          CI: 'true'
          REACT_APP_API_BASE_URL: https://placeholder.invalid
          REACT_APP_API_APP_ID: ci-placeholder
        run: bun run build
